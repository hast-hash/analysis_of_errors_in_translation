<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo','Noto Sans JP',sans-serif;background:#f0f4f8;color:#2d3748;min-height:100vh;padding:28px 20px}
.container{max-width:1100px;margin:0 auto}
h1{font-size:1.55rem;color:#1a365d;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.subtitle{font-size:.88rem;color:#718096;margin-bottom:26px}
.drop-zone{border:2.5px dashed #a0aec0;border-radius:14px;padding:48px 20px;text-align:center;cursor:pointer;background:#fff;margin-bottom:22px;transition:all .2s}

/* cards */

/* tables */

tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f7fafc}

/* metric badges */
.good{color:#22543d;font-weight:700}

/* info box */
.legend{display:flex;flex-wrap:wrap;gap:14px;padding:10px 14px;background:#ebf8ff;border:1px solid #bee3f8;border-radius:8px;font-size:.82rem;color:#2c5282;margin-bottom:16px}

/* method note */
.method{background:#fffbeb;border:1px solid #fef08a;border-radius:8px;padding:12px 16px;font-size:.82rem;color:#713f12;line-height:1.7;margin-top:6px}

/* tabs */
.tabs{display:flex;gap:6px;margin-bottom:14px}

.cat-label{text-align:left!important;font-size:.82rem}

/* spinner */
.spinner{display:inline-block;width:18px;height:18px;border:3px solid #e2e8f0;border-top-color:#3182ce;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* PDF button */
#pdfBar{display:none;justify-content:flex-end;margin-bottom:14px}
#pdfBtn{display:flex;align-items:center;gap:8px;padding:9px 20px;background:#e53e3e;color:#fff;border:none;border-radius:8px;font-size:.92rem;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 2px 6px rgba(229,62,62,.35);transition:background .15s}
#pdfBtn:hover{background:#c53030}
#pdfBtn svg{flex-shrink:0}

/* ── Print styles ── */

  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{background:#fff!important;padding:10px 14px!important;font-size:10pt}

  h1{font-size:14pt!important;margin-bottom:3px!important}
  .subtitle{margin-bottom:12px!important}
  .drop-zone,#pdfBar{display:none!important}
  .card{box-shadow:none!important;border:1px solid #cbd5e0!important;border-radius:6px!important;padding:12px 14px!important;margin-bottom:12px!important;break-inside:avoid}
  .card h2{font-size:11pt!important;padding-bottom:5px!important;margin-bottom:8px!important}
  table{font-size:8.5pt!important}
  th,td{padding:5px 7px!important}
  th{background:#edf2f7!important}
  .sum-row td{background:#edf2f7!important}
  .legend{font-size:8pt!important;padding:6px 10px!important;background:#ebf8ff!important;border:1px solid #bee3f8!important}
  .method{font-size:8pt!important;padding:8px 10px!important;background:#fffbeb!important;border:1px solid #fbbf24!important}
  .good{color:#276749!important} .mod{color:#744210!important} .poor{color:#9b2c2c!important} .neg{color:#702459!important} .na{color:#a0aec0!important}
  /* page header stamp */
  #printHeader{display:block!important;text-align:right;font-size:8pt;color:#718096;border-bottom:1px solid #e2e8f0;padding-bottom:4px;margin-bottom:10px}
}
@media screen{
  #printHeader{display:none}
}
</style>
</head>
<body>
<div class="container">
  <h1>🔬 評価者間信頼性計算ツール</h1>
  <p class="subtitle">翻訳品質アノテーションデータの Interrater Reliability を3指標で計算します</p>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <div class="dz-icon">📊</div>
    <div class="dz-text"><strong>クリック</strong>またはここに<strong>ドラッグ&ドロップ</strong>でXLSXを読み込む</div>
    <div class="dz-sub">ステップ1＿合計.xlsx 形式に対応</div>
  </div>

  <!-- print header (visible only in print/PDF) -->
  <div id="printHeader">評価者間信頼性計算ツール — 出力日時: <span id="printDate"></span></div>

  <!-- PDF save button bar -->
  <div id="pdfBar">
    <button id="pdfBtn" onclick="savePDF()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 18 15 15"/>
      </svg>
      PDFとして保存
    </button>
  </div>

  <div id="results"></div>
</div>

<script>
// ─── Utility ──────────────────────────────────────────────────────────────────
function ffill(arr){
  let last=null;
  return arr.map(v=>{
    if(v!==null&&v!==undefined&&v!=='')last=v;
    return last;
  });
}
function toNum(v){
  if(v===null||v===undefined||v==='')return 0;
  const n=Number(v); return isNaN(n)?0:n;
}
function toBin(v){ return toNum(v)>0?1:0; }
function mean(arr){ return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null; }
function std(arr){
  if(arr.length<2)return null;
  const m=mean(arr);
  return Math.sqrt(arr.reduce((a,b)=>a+(b-m)**2,0)/(arr.length-1));
}

// ─── Statistical Functions ────────────────────────────────────────────────────

/**
 * Krippendorff's α  (nominal scale, binary 0/1 data)
 * ratings: N-item × R-rater matrix (0|1, null=missing)
 */
function krippendorffAlpha(ratings){
  // Build coincidence matrix for binary values {0,1}
  let o00=0,o01=0,o11=0;
  for(const row of ratings){
    const vals=row.filter(v=>v!==null);
    const m=vals.length;
    if(m<2)continue;
    const n1=vals.reduce((a,b)=>a+b,0);
    const n0=m-n1;
    const d=m-1;
    o00+=n0*(n0-1)/d;
    o11+=n1*(n1-1)/d;
    o01+=n0*n1/d;   // symmetric: o_{01}=o_{10}
  }
  // Marginals: n_{.0}=o00+o01, n_{.1}=o01+o11
  const n0=o00+o01, n1=o01+o11, n=n0+n1;
  if(n<2)return null;
  // D_o = Σ_{c≠k} o_{ck}/n = 2*o01/n
  const Do=(2*o01)/n;
  // D_e = 2*n0*n1 / (n*(n-1))
  const De=(2*n0*n1)/(n*(n-1));
  if(De<1e-12)return Do<1e-12?1.0:null;
  return 1-Do/De;
}

/**
 * ICC(2,1) absolute agreement (two-way random effects)
 * ratings: N × R matrix (numbers, all filled — treat null as 0)
 */
function icc21(ratings){
  const N=ratings.length; if(N<2)return null;
  const R=ratings[0].length; if(R<2)return null;
  const allVals=ratings.flat();
  const gm=mean(allVals);
  // Row/col means
  const rm=ratings.map(r=>mean(r));
  const cm=Array.from({length:R},(_,j)=>mean(ratings.map(r=>r[j])));
  let SSr=0,SSc=0,SSe=0;
  for(const mi of rm)SSr+=(mi-gm)**2; SSr*=R;
  for(const mj of cm)SSc+=(mj-gm)**2; SSc*=N;
  for(let i=0;i<N;i++)for(let j=0;j<R;j++)SSe+=(ratings[i][j]-rm[i]-cm[j]+gm)**2;
  const dfr=N-1,dfc=R-1,dfe=(N-1)*(R-1);
  if(dfe===0)return null;
  const MSr=SSr/dfr,MSc=SSc/dfc,MSe=SSe/dfe;
  // ICC(2,1) absolute: (MSr-MSe)/(MSr+(R-1)*MSe + R*(MSc-MSe)/N)
  const num=MSr-MSe;
  const den=MSr+(R-1)*MSe+(R/N)*(MSc-MSe);
  if(Math.abs(den)<1e-12){
    // all variance zero → check if all same value
    return Math.abs(num)<1e-12?1.0:null;
  }
  return num/den;
}

/**
 * Fleiss' κ  (binary ratings, variable rater count per item)
 * ratings: N × R matrix (0|1, null=missing)
 */
function fleissKappa(ratings){
  let sumPi=0,tot1=0,totR=0,valid=0;
  for(const row of ratings){
    const vals=row.filter(v=>v!==null);
    const m=vals.length; if(m<2)continue;
    const n1=vals.reduce((a,b)=>a+b,0);
    const n0=m-n1;
    sumPi+=(n0*(n0-1)+n1*(n1-1))/(m*(m-1));
    tot1+=n1; totR+=m; valid++;
  }
  if(valid===0||totR===0)return null;
  const Pbar=sumPi/valid;
  const p1=tot1/totR,p0=1-p1;
  const Pe=p0*p0+p1*p1;
  if(Math.abs(1-Pe)<1e-12)return 1.0;
  return (Pbar-Pe)/(1-Pe);
}

// ─── Parsing ──────────────────────────────────────────────────────────────────
function parseExcel(buf){
  const wb=XLSX.read(new Uint8Array(buf),{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});

  const row1=ffill(raw[0]||[]);   // text labels
  const row2=ffill(raw[1]||[]);   // translator labels
  const row3=raw[2]||[];           // rater names

  // Build group list from header (groups of 3 rater columns starting at col 3)
  const groups=[];
  for(let col=3;col+2<row3.length;col+=3){
    const text=row1[col]||'';
    const trans=row2[col]||'';
    const raters=[row3[col],row3[col+1],row3[col+2]].map(r=>r||'?');
    if(!text&&!trans)break;
    groups.push({text,translator:trans,raters,colStart:col,counts:[],binary:[]});
  }

  // Parse data rows
  const categories=[];
  let curCat='';
  for(let ri=3;ri<raw.length;ri++){
    const row=raw[ri];
    if(!row||!row[1])continue;
    if(row[0])curCat=row[0];
    categories.push({cat:curCat,subcat:row[1],desc:row[2]});
    for(const g of groups){
      const c=g.colStart;
      const counts=[toNum(row[c]),toNum(row[c+1]),toNum(row[c+2])];
      g.counts.push(counts);
      g.binary.push(counts.map(toBin));
    }
  }

  return {groups,categories};
}

// ─── Compute per-group metrics ────────────────────────────────────────────────
function computeGroup(g){
  const alpha=krippendorffAlpha(g.binary);
  const iccv=icc21(g.counts);
  const kappa=fleissKappa(g.binary);
  return {alpha,icc:iccv,kappa};
}

// ─── Pooled α and κ across all groups ────────────────────────────────────────
// Pool all item-level binary ratings (different raters per group is OK for
// the coincidence matrix / Fleiss methods)
function pooledAlpha(groups){
  const allBinary=groups.flatMap(g=>g.binary);
  return krippendorffAlpha(allBinary);
}
function pooledKappa(groups){
  const allBinary=groups.flatMap(g=>g.binary);
  return fleissKappa(allBinary);
}
// For ICC pooled: use one-way random ICC (ignores rater identity differences)
function pooledICC(groups){
  const allCounts=groups.flatMap(g=>g.counts);
  return icc21(allCounts);
}

// ─── Display helpers ─────────────────────────────────────────────────────────
function cls(v){
  if(v===null||v===undefined)return 'na';
  if(v<0)return 'neg';
  if(v>=0.61)return 'good';
  if(v>=0.21)return 'mod';
  return 'poor';
}
function fmt(v,digits=3){
  if(v===null||v===undefined)return '<span class="na">N/A</span>';
  return `<span class="${cls(v)}">${v.toFixed(digits)}</span>`;
}
function fmtStat(v,s){
  if(v===null)return '<span class="na">N/A</span>';
  const sd=s!==null?` <small style="color:#a0aec0;font-weight:400">(±${s.toFixed(3)})</small>`:'';
  return `<span class="${cls(v)}">${v.toFixed(3)}</span>${sd}`;
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderResults({groups,categories}){
  const metrics=groups.map(computeGroup);

  // --- Grouped by text ---
  const byText={};
  groups.forEach((g,i)=>{
    if(!byText[g.text])byText[g.text]=[];
    byText[g.text].push({g,m:metrics[i]});
  });

  // --- Grouped by translator ---
  const byTrans={};
  groups.forEach((g,i)=>{
    const t=g.translator.toLowerCase();
    if(!byTrans[t])byTrans[t]=[];
    byTrans[t].push({g,m:metrics[i]});
  });

  // --- Pooled / overall ---
  const poolAlpha=pooledAlpha(groups);
  const poolICC=pooledICC(groups);
  const poolKappa=pooledKappa(groups);
  const meanAlpha=mean(metrics.map(m=>m.alpha).filter(v=>v!==null));
  const meanICC=mean(metrics.map(m=>m.icc).filter(v=>v!==null));
  const meanKappa=mean(metrics.map(m=>m.kappa).filter(v=>v!==null));
  const sdAlpha=std(metrics.map(m=>m.alpha).filter(v=>v!==null));
  const sdICC=std(metrics.map(m=>m.icc).filter(v=>v!==null));
  const sdKappa=std(metrics.map(m=>m.kappa).filter(v=>v!==null));

  // --- Per-category analysis (pooled across all groups) ---
  const catMetrics=categories.map((_,ci)=>{
    const binRows=groups.map(g=>g.binary[ci]);
    const cntRows=groups.map(g=>g.counts[ci]);
    return{
      alpha:krippendorffAlpha(binRows),
      icc:icc21(cntRows),
      kappa:fleissKappa(binRows)
    };
  });

  // ── Build HTML ──
  let html=`
  <div class="card">
    <h2>📋 グループ別結果（テキスト × 翻訳システム × 評価者）</h2>
    <div class="legend">
      <span>判定基準：</span>
      <span class="good">■ 良好 ≥ 0.61</span>
      <span class="mod">■ 中程度 0.21–0.60</span>
      <span class="poor">■ 低い &lt; 0.21</span>
      <span class="neg">■ 負 &lt; 0 (偶然以下)</span>
      <span class="na">— N/A (分散なし等)</span>
    </div>
    <table>
      <thead>
        <tr>
          <th>テキスト</th>
          <th>翻訳</th>
          <th class="raters-cell">評価者</th>
          <th>Krippendorff α<br><small>カテゴリ付与一致</small></th>
          <th>ICC (2,1)<br><small>件数一致</small></th>
          <th>Fleiss κ<br><small>単純一致率</small></th>
        </tr>
      </thead>
      <tbody>`;

  for(const[text,items] of Object.entries(byText)){
    items.forEach(({g,m},idx)=>{
      html+=`<tr>
        <td>${idx===0?text:''}</td>
        <td>${g.translator}</td>
        <td class="raters-cell">${g.raters.join('・')}</td>
        <td>${fmt(m.alpha)}</td>
        <td>${fmt(m.icc)}</td>
        <td>${fmt(m.kappa)}</td>
      </tr>`;
    });
  }

  html+=`<tr class="sum-row">
    <td colspan="3">📊 グループ平均 (SD)</td>
    <td>${fmtStat(meanAlpha,sdAlpha)}</td>
    <td>${fmtStat(meanICC,sdICC)}</td>
    <td>${fmtStat(meanKappa,sdKappa)}</td>
  </tr>
  <tr class="sum-row">
    <td colspan="3">📊 全データ統合（プール推定）</td>
    <td>${fmt(poolAlpha)}</td>
    <td>${fmt(poolICC)}</td>
    <td>${fmt(poolKappa)}</td>
  </tr>
  </tbody></table>
  <div class="method" style="margin-top:14px">
    <b>プール推定の注意：</b>
    ICC はグループ間で評価者が異なるため、プール値は評価者効果を無視した一方向ランダム効果モデルに基づきます。
    Krippendorff α・Fleiss κ の coincidence matrix は評価者同一性を必要としないため全グループの
    アイテムを統合して算出しています。
  </div>
  </div>

  <div class="card">
    <h2>📁 テキスト別集計</h2>
    <table>
      <thead><tr><th>テキスト</th><th>Krippendorff α (平均)</th><th>ICC (平均)</th><th>Fleiss κ (平均)</th></tr></thead>
      <tbody>`;

  for(const[text,items] of Object.entries(byText)){
    const as=items.map(x=>x.m.alpha).filter(v=>v!==null);
    const is=items.map(x=>x.m.icc).filter(v=>v!==null);
    const ks=items.map(x=>x.m.kappa).filter(v=>v!==null);
    html+=`<tr>
      <td>${text}</td>
      <td>${fmt(mean(as))}</td>
      <td>${fmt(mean(is))}</td>
      <td>${fmt(mean(ks))}</td>
    </tr>`;
  }
  html+=`</tbody></table></div>

  <div class="card">
    <h2>🤖 翻訳システム別集計</h2>
    <table>
      <thead><tr><th>翻訳システム</th><th>Krippendorff α (平均)</th><th>ICC (平均)</th><th>Fleiss κ (平均)</th></tr></thead>
      <tbody>`;

  for(const[trans,items] of Object.entries(byTrans)){
    const as=items.map(x=>x.m.alpha).filter(v=>v!==null);
    const is=items.map(x=>x.m.icc).filter(v=>v!==null);
    const ks=items.map(x=>x.m.kappa).filter(v=>v!==null);
    html+=`<tr>
      <td style="text-transform:capitalize">${trans}</td>
      <td>${fmt(mean(as))}</td>
      <td>${fmt(mean(is))}</td>
      <td>${fmt(mean(ks))}</td>
    </tr>`;
  }
  html+=`</tbody></table></div>

  <div class="card">
    <h2>🏷️ アノテーション・カテゴリー別結果（全グループ統合）</h2>
    <p style="font-size:.84rem;color:#718096;margin-bottom:12px">各カテゴリーについて、全テキスト×翻訳の12グループを統合して算出（N=12アイテム）</p>
    <table>
      <thead>
        <tr>
          <th style="text-align:left">カテゴリー</th>
          <th style="text-align:left" class="cat-label">サブカテゴリー</th>
          <th>Krippendorff α</th>
          <th>ICC (2,1)</th>
          <th>Fleiss κ</th>
        </tr>
      </thead>
      <tbody>`;

  categories.forEach((c,i)=>{
    const m=catMetrics[i];
    html+=`<tr>
      <td class="cat-label" style="font-size:.8rem;color:#718096">${c.cat||''}</td>
      <td class="cat-label">${c.subcat}</td>
      <td>${fmt(m.alpha)}</td>
      <td>${fmt(m.icc)}</td>
      <td>${fmt(m.kappa)}</td>
    </tr>`;
  });

  // summary for categories
  const caAlphas=catMetrics.map(m=>m.alpha).filter(v=>v!==null);
  const caICCs=catMetrics.map(m=>m.icc).filter(v=>v!==null);
  const caKappas=catMetrics.map(m=>m.kappa).filter(v=>v!==null);
  html+=`<tr class="sum-row">
    <td colspan="2">平均</td>
    <td>${fmt(mean(caAlphas))}</td>
    <td>${fmt(mean(caICCs))}</td>
    <td>${fmt(mean(caKappas))}</td>
  </tr>
  </tbody></table></div>

  <div class="card">
    <h2>📖 計算方法・指標の解説</h2>
    <div class="method">
      <b>Krippendorff α（カテゴリ付与一致）：</b>
      各評価者が各カテゴリーに件数を付与したか否か（0/1に二値変換）をNominal scaleとして評価。
      Coincidence matrix から観測一致度 D_o と期待一致度 D_e を算出し α = 1 − D_o/D_e。
      欠損値は0件（カテゴリー未付与）として扱います。<br><br>
      <b>ICC (2,1) Absolute Agreement（件数一致）：</b>
      生カウントデータを対象に、Two-way random effects モデルの絶対一致 ICC を算出。
      ICC = (MS_R − MS_E) / (MS_R + (k−1)·MS_E + k·(MS_C − MS_E)/N)。
      評価者間の系統的なカウントの差も誤差として扱います。<br><br>
      <b>Fleiss κ（単純一致率）：</b>
      カテゴリー付与の有無（0/1）を対象に、偶然一致を補正したFleis's kappa を算出。
      P̄ = 各アイテムの評価者間合意度の平均、P̄_e = 偶然期待合意度 として κ = (P̄ − P̄_e)/(1 − P̄_e)。<br><br>
      <b>基準値（目安）：</b>
      α・κ ≥ 0.80 = 高い一致、0.61–0.80 = 実質的一致、0.41–0.60 = 中程度、0.21–0.40 = 低い、≤ 0.20 = わずか。
      ICC ≥ 0.75 = 高い、0.50–0.74 = 中程度、&lt;0.50 = 低い（Cicchetti, 1994）。
    </div>
  </div>`;

  document.getElementById('results').innerHTML=html;
  // Show PDF button
  document.getElementById('pdfBar').style.display='flex';
  // Set print timestamp
  document.getElementById('printDate').textContent=new Date().toLocaleString('ja-JP');
}

// ─── PDF export ───────────────────────────────────────────────────────────────
function savePDF(){
  // Update timestamp right before printing
  document.getElementById('printDate').textContent=new Date().toLocaleString('ja-JP');
  window.print();
}

// ─── File handling ────────────────────────────────────────────────────────────
const dz=document.getElementById('dropZone');
const fi=document.getElementById('fileInput');

dz.addEventListener('click',()=>fi.click());
fi.addEventListener('change',e=>{ if(e.target.files[0])load(e.target.files[0]); });
dz.addEventListener('dragover',e=>{ e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{
  e.preventDefault(); dz.classList.remove('over');
  if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);
});

function load(file){
  dz.innerHTML=`<div class="dz-icon"><span class="spinner"></span></div><div class="dz-text">読み込み中…</div>`;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const data=parseExcel(e.target.result);
      renderResults(data);
      dz.innerHTML=`<div class="dz-icon">✅</div>
        <div class="dz-text"><strong>${file.name}</strong> を読み込みました</div>
        <div class="dz-sub">別のファイルを読み込むにはクリックまたはドラッグ&ドロップ</div>`;
      fi.value='';
    }catch(err){
      console.error(err);
      dz.innerHTML=`<div class="dz-icon">❌</div><div class="dz-text" style="color:#c53030">${err.message}</div>`;
    }
  };
  r.readAsArrayBuffer(file);
}
</script>
